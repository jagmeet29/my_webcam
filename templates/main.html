<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Security Dashboard</title>
    
    <style>
      :root {
        --bg-color: #0f172a;       
        --card-bg: #1e293b;        
        --text-main: #f8fafc;      
        --text-muted: #94a3b8;     
        --status-live: #10b981;    
        --status-offline: #ef4444; 
      }

      body {
        margin: 0; 
        font-family: system-ui, sans-serif; 
        background-color: var(--bg-color); 
        color: var(--text-main); 
        padding: 1rem; 
      }

      .dashboard {
        display: grid; 
        grid-template-columns: 1fr; 
        gap: 1.5rem; 
        max-width: 1200px; 
        margin: 0 auto; 
      }

      .panel {
        background: var(--card-bg); 
        border-radius: 12px; 
        overflow: hidden; 
        box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5); 
      }

      .header {
        padding: 1rem; 
        display: flex; 
        justify-content: space-between; 
        align-items: center; 
        border-bottom: 1px solid #334155; 
      }

      h2 {
        margin: 0; 
        font-size: 1.1rem; 
      }

      .video-wrapper {
        aspect-ratio: 4/3; 
        background-color: #000; 
        display: flex; 
        justify-content: center; 
        align-items: center; 
      }

      #live-feed {
        width: 100%; 
        height: 100%; 
        object-fit: contain; 
      }

      .status-dot {
        width: 12px;
        height: 12px;
        background-color: var(--status-offline); 
        border-radius: 50%; 
        display: inline-block; 
      }

      .status-dot.live {
        background-color: var(--status-live); 
        box-shadow: 0 0 8px var(--status-live); 
      }

      .video-list {
        list-style: none; 
        padding: 0; 
        margin: 0;
        max-height: 40vh; 
        overflow-y: auto; 
      }

      .video-item {
        padding: 1.2rem 1rem; 
        border-bottom: 1px solid #334155; 
        cursor: pointer; 
        transition: background 0.2s; 
        font-size: 0.95rem; 
      }

      .video-item:hover, .video-item:active {
        background: #334155; 
      }

      #playback-player {
        width: 100%; 
        background: #000; 
        display: none; 
      }

      .audio-bar {
        padding: 10px 1.5rem; 
        border-bottom: 1px solid #334155; 
        background: #1e293b; 
        text-align: center;
      }
      #enable-audio {
        padding: 8px 16px; 
        cursor: pointer; 
        border-radius: 6px; 
        background: #3b82f6; 
        color: white; 
        border: none; 
        font-weight: bold;
        transition: background 0.3s;
      }

      @media (min-width: 768px) {
        body { padding: 2rem; }
        .dashboard { grid-template-columns: 2fr 1fr; gap: 2rem; }
        h2 { font-size: 1.2rem; }
        .header { padding: 1rem 1.5rem; }
        .video-list { max-height: 500px; }
      }
    </style>
  </head>
  <body>
    
    <div class="dashboard">
      
      <div class="panel">
        <div class="header">
          <h2>
            <span class="status-dot" id="status-dot"></span> 
            Live Stream
          </h2>
          <span class="status-text" id="status-text" style="color: var(--text-muted); font-size: 0.9rem;">Connecting...</span>
        </div>
        
        <div class="audio-bar">
            <button id="enable-audio">Enable Live Audio</button>
        </div>

        <div class="video-wrapper">
          <img id="live-feed" alt="Live stream" style="display: none;"/>
          <div id="placeholder" style="color: var(--text-muted);">Waiting for signal...</div>
        </div>
      </div>

      <div class="panel">
        <div class="header">
          <h2>Recorded Events</h2>
          <button onclick="fetchVideos()" style="background: none; border: 1px solid var(--text-muted); color: var(--text-main); border-radius: 6px; padding: 0.4rem 0.8rem; cursor: pointer; font-size: 0.9rem;">Refresh</button>
        </div>
        
        <video id="playback-player" controls autoplay></video>
        
        <ul class="video-list" id="video-list">
          <li style="padding: 1rem; color: var(--text-muted);">Loading recordings...</li>
        </ul>
      </div>
    </div>

    <script>
      const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
      const wsUrl = protocol + '//' + window.location.host + '/stream';
      const ws = new WebSocket(wsUrl);
      
      const img = document.getElementById("live-feed");
      const statusDot = document.getElementById("status-dot");
      const statusText = document.getElementById("status-text");
      const placeholder = document.getElementById("placeholder");
      
      ws.onopen = () => {
        statusDot.classList.add("live"); 
        statusText.textContent = "Live"; 
      };

      ws.onmessage = (event) => {
        if (img.style.display === "none") {
          placeholder.style.display = "none"; 
          img.style.display = "block"; 
        }
        
        const blob = new Blob([event.data], { type: "image/jpeg" });
        if (img.src) URL.revokeObjectURL(img.src);
        img.src = URL.createObjectURL(blob);
      };

      ws.onclose = () => {
        statusDot.classList.remove("live"); 
        statusText.textContent = "Disconnected"; 
      };

      const audioBtn = document.getElementById('enable-audio');
      let audioCtx;
      let nextAudioTime = 0;

      audioBtn.addEventListener('click', () => {
        if (audioCtx) return; 
        
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const audioWsUrl = protocol + '//' + window.location.host + '/audio_stream';
        const audioWs = new WebSocket(audioWsUrl);
        audioWs.binaryType = 'arraybuffer'; 

        audioWs.onmessage = (event) => {
            const int16Array = new Int16Array(event.data);
            const float32Array = new Float32Array(int16Array.length);
            for (let i = 0; i < int16Array.length; i++) {
                float32Array[i] = int16Array[i] / 32768.0; 
            }

            const audioBuffer = audioCtx.createBuffer(1, float32Array.length, 44100);
            audioBuffer.getChannelData(0).set(float32Array);

            const source = audioCtx.createBufferSource();
            source.buffer = audioBuffer;
            source.connect(audioCtx.destination);

            // JITTER BUFFER FIX: Absorbs network stuttering
            if (nextAudioTime < audioCtx.currentTime) {
                nextAudioTime = audioCtx.currentTime + 0.3; 
            }
            source.start(nextAudioTime);
            nextAudioTime += audioBuffer.duration;
        };

        audioBtn.textContent = "Audio is Live";
        audioBtn.style.background = "#10b981"; 
        audioBtn.style.cursor = "default";
      });

      async function fetchVideos() {
        const listElement = document.getElementById("video-list");
        try {
          const response = await fetch('/api/videos');
          const data = await response.json();
          listElement.innerHTML = '';

          if(data.videos.length === 0) {
            listElement.innerHTML = '<li style="padding: 1rem; color: var(--text-muted);">No recordings found.</li>';
            return; 
          }

          data.videos.forEach(filename => {
            const li = document.createElement("li");
            li.className = "video-item"; 
            let cleanName = filename.replace("Detection_", "").replace(".webm", "");
            li.textContent = cleanName; 
            li.onclick = () => {
              playVideo(filename); 
              document.getElementById("playback-player").scrollIntoView({ behavior: "smooth", block: "center" });
            };
            listElement.appendChild(li);
          });
        } catch (error) {
          listElement.innerHTML = '<li style="padding: 1rem; color: var(--status-offline);">Failed to load videos.</li>';
        }
      }

      function playVideo(filename) {
        const player = document.getElementById("playback-player");
        player.style.display = "block"; 
        player.src = "/recordings/" + filename; 
        player.play(); 
      }

      window.onload = fetchVideos;
    </script>
  </body>
</html>
